# Minimal Kubernetes deployment of the DAS governance control plane.
#   kubectl apply -f deploy/k8s.yaml
# The audit secret comes from a Secret (never baked into the image); persisted
# state lives on a PVC so the forest + signed log survive pod restarts. The fleet
# itself is declared in the das-spec ConfigMap (client.yaml) and stood up by
# `das deploy` on first boot — edit that ConfigMap to change tenants/experts.
---
apiVersion: v1
kind: Secret
metadata:
  name: das-audit
type: Opaque
stringData:
  # CHANGE THIS. Losing/altering it invalidates the audit chain on reload.
  secret: "change-me-in-prod"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: das-spec
data:
  # The declarative deployment spec — the container's front door. `das deploy`
  # reads this on first boot to stand up the governed fleet.
  client.yaml: |
    client: northwind
    d_model: 18
    audit:
      secret_env: DAS_AUDIT_SECRET
    escalation:
      frontier_llm: claude-sonnet-5
      confidence_threshold: 0.7
    tenants:
      - name: careplus
        experts:
          - name: medical-claim
            keywords: [claim, mri, denied, appeal]
      - name: fintrust
        experts:
          - name: card-dispute
            keywords: [charge, card, merchant, dispute, fraud]
    users:
      - name: care-agent
        role: operator
        tenant: careplus
      - name: bank-agent
        role: operator
        tenant: fintrust
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: das-state
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: das-governance
  labels: { app: das-governance }
spec:
  replicas: 1            # single writer: the control plane owns one audit chain
  selector:
    matchLabels: { app: das-governance }
  template:
    metadata:
      labels: { app: das-governance }
    spec:
      containers:
        - name: das-governance
          image: das-governance:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5070
          env:
            - name: DAS_STATE
              value: /data
            - name: DAS_PORT
              value: "5070"
            - name: DAS_SPEC          # the front door: deploy this spec on first boot
              value: /spec/client.yaml
            - name: DAS_AUDIT_SECRET
              valueFrom:
                secretKeyRef: { name: das-audit, key: secret }
          volumeMounts:
            - name: state
              mountPath: /data
            - name: spec
              mountPath: /spec
              readOnly: true
          readinessProbe:
            httpGet: { path: /health, port: 5070 }
            initialDelaySeconds: 15
            periodSeconds: 15
          livenessProbe:
            httpGet: { path: /health, port: 5070 }
            initialDelaySeconds: 25
            periodSeconds: 30
          resources:
            requests: { cpu: "100m", memory: "256Mi" }
            limits: { cpu: "1", memory: "512Mi" }
      volumes:
        - name: state
          persistentVolumeClaim:
            claimName: das-state
        - name: spec
          configMap:
            name: das-spec
---
apiVersion: v1
kind: Service
metadata:
  name: das-governance
spec:
  selector: { app: das-governance }
  ports:
    - port: 80
      targetPort: 5070
